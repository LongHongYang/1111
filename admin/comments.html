<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>评论管理 - 博客管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="../api.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    .sidebar { width: 220px; background-color: #304156; min-height: 100vh; position: fixed; left: 0; top: 0; }
    .sidebar .logo { height: 60px; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; font-size: 18px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,.1); }
    .sidebar nav { padding: 10px; }
    .sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; color: #bfcbd9; text-decoration: none; border-radius: 4px; margin-bottom: 4px; }
    .sidebar nav a:hover, .sidebar nav a.active { background: #1f2d3d; color: #409eff; }
    .main-area { margin-left: 220px; }
    .topbar { height: 56px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .content { padding: 20px; background: #f0f2f5; min-height: calc(100vh - 56px); }
    .table-btn { padding: 4px 10px; border-radius: 4px; border: 1px solid #dcdfe6; background: white; cursor: pointer; font-size: 13px; }
    .table-btn:hover { border-color: #409eff; color: #409eff; }
    .table-btn.danger { color: #f56c6c; border-color: #f56c6c; }
    .table-btn.danger:hover { background: #fef0f0; }
    .table-btn.success { color: #67c23a; border-color: #67c23a; }
    .table-btn.success:hover { background: #f0f9eb; }
    .pagination-wrap { margin-top: 20px; display: flex; justify-content: flex-end; }
    .pagination button { padding: 6px 14px; border: 1px solid #e8eaed; border-radius: 4px; background: white; cursor: pointer; }
    .pagination button.active { background: #409eff; color: white; border-color: #409eff; }
    .comment-content { color: #303133; line-height: 1.6; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .article-link { color: #909399; font-size: 13px; }
    .user-cell { display: flex; align-items: center; gap: 8px; justify-content: center; }
    .user-name { font-size: 13px; color: #606266; }
    .admin-only { display: none; }
  </style>
</head>
<body>

<!-- 侧边栏 -->
<aside class="sidebar">
  <div class="logo">
    <i class="fa fa-pencil-square-o"></i>
    <span>博客管理</span>
  </div>
  <nav>
    <a href="/1111/admin/dashboard.html"><i class="fa fa-dashboard"></i> 仪表盘</a>
    <a href="/1111/admin/articles.html"><i class="fa fa-file-text"></i> 文章管理</a>
    <a href="/1111/admin/article-edit.html"><i class="fa fa-pencil"></i> 写文章</a>
    <a href="/1111/admin/categories.html" class="admin-only"><i class="fa fa-folder"></i> 分类管理</a>
    <a href="/1111/admin/comments.html" class="active"><i class="fa fa-comments"></i> 评论管理</a>
    <a href="/1111/admin/users.html" class="admin-only"><i class="fa fa-users"></i> 用户管理</a>
    <a href="/1111/admin/statistics.html" class="admin-only"><i class="fa fa-bar-chart"></i> 数据统计</a>
    <a href="/1111/admin/profile.html"><i class="fa fa-user"></i> 个人信息</a>
    <a href="/1111/index.html" onclick="BlogAPI.clearToken()"><i class="fa fa-sign-out"></i> 退出登录</a>
  </nav>
</aside>

<!-- 主内容区 -->
<div class="main-area">
  <header class="topbar">
    <div>
      <span class="text-lg font-semibold text-gray-800">评论管理</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-gray-600" id="current-user-name">admin</span>
      <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white" id="current-user-avatar">A</div>
    </div>
  </header>
  
  <main class="content">
    <!-- 筛选栏 -->
    <div class="bg-white rounded-lg shadow-sm p-4 mb-4 flex items-center gap-12">
      <span style="font-size:16px;font-weight:600;">评论列表</span>
      <span class="px-2 py-1 bg-blue-50 text-blue-600 rounded text-sm">共 <span id="total-count">0</span> 条评论</span>
    </div>

    <!-- 评论表格 -->
    <div class="bg-white rounded-lg shadow-sm">
      <table class="w-full">
        <thead>
          <tr class="text-left text-sm text-gray-500 bg-gray-50">
            <th class="px-6 py-3 w-12 text-center">ID</th>
            <th class="px-6 py-3">内容</th>
            <th class="px-6 py-3 w-44 text-center">用户</th>
            <th class="px-6 py-3 w-20 text-center">状态</th>
            <th class="px-6 py-3 w-44 text-center">时间</th>
            <th class="px-6 py-3 w-40 text-center">操作</th>
          </tr>
        </thead>
        <tbody id="comment-table-body">
        </tbody>
      </table>
      <div class="pagination-wrap">
        <div class="pagination" id="pagination">
        </div>
      </div>
    </div>
  </main>
</div>

<script>
let currentPage = 1;
let totalPages = 1;

function checkLogin() {
  const user = JSON.parse(localStorage.getItem('current_user') || 'null');
  if (!user) {
    location.href = '/1111/login.html';
    return false;
  }
  
  document.getElementById('current-user-name').textContent = user.username || user.nickname || '用户';
  document.getElementById('current-user-avatar').textContent = (user.username || user.nickname || 'U').charAt(0).toUpperCase();
  
  if (user.role === 1) {
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
  }
  
  return true;
}

async function loadComments(pageNum = 1) {
  if (!checkLogin()) return;
  
  try {
    const result = await BlogAPI.getAdminComments(pageNum, 10);
    if (result.code === 200) {
      currentPage = pageNum;
      totalPages = Math.ceil(result.data.total / 10);
      document.getElementById('total-count').textContent = result.data.total;
      renderComments(result.data.list);
      renderPagination();
    }
  } catch (error) {
    console.error('加载评论失败:', error);
  }
}

function renderComments(comments) {
  const tbody = document.getElementById('comment-table-body');
  if (!comments || comments.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-12 text-center text-gray-400">暂无评论</td></tr>';
    return;
  }
  
  tbody.innerHTML = comments.map(comment => `
    <tr class="border-t border-gray-100">
      <td class="px-6 py-3 text-center">${comment.id}</td>
      <td class="px-6 py-3">
        <p class="comment-content">${comment.content}</p>
        <p class="article-link">文章：${comment.articleTitle || '未知文章'}</p>
      </td>
      <td class="px-6 py-3">
        <div class="user-cell">
          <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-gray-600 text-sm">${(comment.authorName || 'U').charAt(0).toUpperCase()}</div>
          <span class="user-name">${comment.authorName || '匿名用户'}</span>
        </div>
      </td>
      <td class="px-6 py-3 text-center">
        ${comment.status === 1 ? 
          '<span class="px-2 py-1 bg-green-100 text-green-600 rounded text-xs">显示</span>' : 
          '<span class="px-2 py-1 bg-gray-100 text-gray-600 rounded text-xs">隐藏</span>'}
      </td>
      <td class="px-6 py-3 text-center text-sm">${comment.createTime ? comment.createTime.substring(0, 16) : ''}</td>
      <td class="px-6 py-3 text-center">
        <button class="table-btn mr-2" onclick="toggleStatus(${comment.id}, ${comment.status})">${comment.status === 1 ? '隐藏' : '显示'}</button>
        <button class="table-btn danger" onclick="deleteComment(${comment.id})">删除</button>
      </td>
    </tr>
  `).join('');
}

function renderPagination() {
  const pagination = document.getElementById('pagination');
  let html = '';
  
  html += `<button onclick="loadComments(${Math.max(1, currentPage - 1)})">上一页</button>`;
  
  for (let i = 1; i <= totalPages; i++) {
    html += `<button ${i === currentPage ? 'class="active"' : ''} onclick="loadComments(${i})">${i}</button>`;
  }
  
  html += `<button onclick="loadComments(${Math.min(totalPages, currentPage + 1)})">下一页</button>`;
  
  pagination.innerHTML = html;
}

async function toggleStatus(id, currentStatus) {
  const newStatus = currentStatus === 1 ? 0 : 1;
  
  try {
    const result = await BlogAPI.updateCommentStatus(id, newStatus);
    if (result.code === 200) {
      loadComments(currentPage);
    } else {
      alert(result.msg || '操作失败');
    }
  } catch (error) {
    alert('操作失败，请检查后端服务是否正常');
    console.error(error);
  }
}

async function deleteComment(id) {
  if (!confirm('确定删除此评论吗？')) return;
  
  try {
    const result = await BlogAPI.deleteComment(id);
    if (result.code === 200) {
      loadComments(currentPage);
    } else {
      alert(result.msg || '删除失败');
    }
  } catch (error) {
    alert('删除失败，请检查后端服务是否正常');
    console.error(error);
  }
}

function init() {
  if (!checkLogin()) return;
  loadComments(1);
}

init();
</script>
</body>
</html>
