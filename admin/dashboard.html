<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仪表盘 - 博客管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="../api.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    .sidebar { width: 220px; background-color: #304156; min-height: 100vh; position: fixed; left: 0; top: 0; }
    .sidebar .logo { height: 60px; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; font-size: 18px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,.1); }
    .sidebar nav { padding: 10px; }
    .sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; color: #bfcbd9; text-decoration: none; border-radius: 4px; margin-bottom: 4px; }
    .sidebar nav a:hover, .sidebar nav a.active { background: #1f2d3d; color: #409eff; }
    .sidebar nav a.admin-only { display: none; }
    .main-area { margin-left: 220px; }
    .topbar { height: 56px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .content { padding: 20px; background: #f0f2f5; min-height: calc(100vh - 56px); }
    .stat-card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .stat-value { font-size: 32px; font-weight: bold; color: #303133; }
    .stat-label { font-size: 14px; color: #909399; margin-top: 8px; }
    .stat-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <i class="fa fa-pencil-square-o"></i>
    <span>博客管理</span>
  </div>
  <nav>
    <a href="dashboard.html" class="active"><i class="fa fa-dashboard"></i> 仪表盘</a>
    <a href="articles.html" class="admin-only"><i class="fa fa-file-text"></i> 文章管理</a>
    <a href="article-edit.html"><i class="fa fa-pencil"></i> 写文章</a>
    <a href="categories.html" class="admin-only"><i class="fa fa-folder"></i> 分类管理</a>
    <a href="comments.html"><i class="fa fa-comments"></i> 评论管理</a>
    <a href="users.html" class="admin-only"><i class="fa fa-users"></i> 用户管理</a>
    <a href="statistics.html" class="admin-only"><i class="fa fa-bar-chart"></i> 数据统计</a>
    <a href="profile.html"><i class="fa fa-user"></i> 个人信息</a>
    <a href="../index.html" onclick="BlogAPI.clearToken()"><i class="fa fa-sign-out"></i> 退出登录</a>
  </nav>
</aside>

<div class="main-area">
  <header class="topbar">
    <div>
      <h1 class="text-xl font-bold text-gray-800">仪表盘</h1>
      <p class="text-sm text-gray-500" id="current-date">2024年1月1日 星期一</p>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-gray-600" id="current-user-name">admin</span>
      <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white" id="current-user-avatar">A</div>
    </div>
  </header>
  
  <main class="content">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      <div class="stat-card flex items-center gap-4">
        <div class="stat-icon bg-blue-100 text-blue-500"><i class="fa fa-file-text"></i></div>
        <div>
          <div class="stat-value" id="stat-articles">0</div>
          <div class="stat-label">文章总数</div>
        </div>
      </div>
      <div class="stat-card flex items-center gap-4">
        <div class="stat-icon bg-green-100 text-green-500"><i class="fa fa-comment"></i></div>
        <div>
          <div class="stat-value" id="stat-comments">0</div>
          <div class="stat-label">评论总数</div>
        </div>
      </div>
      <div class="stat-card flex items-center gap-4">
        <div class="stat-icon bg-yellow-100 text-yellow-500"><i class="fa fa-eye"></i></div>
        <div>
          <div class="stat-value" id="stat-views">0</div>
          <div class="stat-label">总浏览量</div>
        </div>
      </div>
      <div class="stat-card flex items-center gap-4">
        <div class="stat-icon bg-purple-100 text-purple-500"><i class="fa fa-user"></i></div>
        <div>
          <div class="stat-value" id="stat-users">0</div>
          <div class="stat-label">用户总数</div>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="bg-white rounded-lg shadow-sm p-6">
        <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
          <i class="fa fa-file-text-o"></i> 最近文章
        </h2>
        <div class="space-y-3" id="recent-articles">
          <div class="text-center text-gray-400 py-8">加载中...</div>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow-sm p-6">
        <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
          <i class="fa fa-comments-o"></i> 最近评论
        </h2>
        <div class="space-y-3" id="recent-comments">
          <div class="text-center text-gray-400 py-8">加载中...</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const user = JSON.parse(localStorage.getItem('current_user') || 'null');
if (!user) {
  alert('请先登录');
  location.href = '/1111/login.html';
}

const isAdmin = user && user.role === 1;

document.getElementById('current-user-name').textContent = user.nickname || user.username;
document.getElementById('current-user-avatar').textContent = (user.nickname || user.username).charAt(0).toUpperCase();

if (!isAdmin) {
  document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
}

const today = new Date();
const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
document.getElementById('current-date').textContent = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日 ${weekdays[today.getDay()]}`;

async function loadStats() {
  try {
    const result = await BlogAPI.getStatistics();
    if (result.code === 200) {
      const data = result.data;
      document.getElementById('stat-articles').textContent = data.articleCount || 0;
      document.getElementById('stat-comments').textContent = data.commentCount || 0;
      document.getElementById('stat-views').textContent = data.totalViews || 0;
      document.getElementById('stat-users').textContent = data.userCount || 0;
    }
  } catch (error) {
    console.error('加载统计数据失败', error);
    document.getElementById('stat-articles').textContent = '-';
    document.getElementById('stat-comments').textContent = '-';
    document.getElementById('stat-views').textContent = '-';
    document.getElementById('stat-users').textContent = '-';
  }
}

async function loadRecentArticles() {
  try {
    const result = await BlogAPI.getArticleList({ page: 1, size: 5 });
    if (result.code === 200) {
      const articles = result.data.list || [];
      const container = document.getElementById('recent-articles');
      container.innerHTML = '';
      
      if (articles.length === 0) {
        container.innerHTML = '<div class="text-center text-gray-400 py-4">暂无文章</div>';
        return;
      }
      
      articles.forEach(article => {
        const div = document.createElement('div');
        div.className = 'flex items-center justify-between p-3 border-b border-gray-100 last:border-0';
        div.innerHTML = `
          <div class="flex-1">
            <div class="font-medium text-gray-800">${article.title}</div>
            <div class="text-sm text-gray-500">${article.authorName || article.username} · ${formatDate(article.createTime)}</div>
          </div>
          <div class="flex items-center gap-4 text-sm text-gray-400">
            <span><i class="fa fa-eye"></i> ${article.viewCount || 0}</span>
            <span><i class="fa fa-comment"></i> ${article.commentCount || 0}</span>
          </div>
        `;
        container.appendChild(div);
      });
    }
  } catch (error) {
    console.error('加载文章失败', error);
    document.getElementById('recent-articles').innerHTML = '<div class="text-center text-gray-400 py-4">加载失败</div>';
  }
}

async function loadRecentComments() {
  try {
    const result = await BlogAPI.getCommentList({ page: 1, size: 5 });
    if (result.code === 200) {
      const comments = result.data.list || [];
      const container = document.getElementById('recent-comments');
      container.innerHTML = '';
      
      if (comments.length === 0) {
        container.innerHTML = '<div class="text-center text-gray-400 py-4">暂无评论</div>';
        return;
      }
      
      comments.forEach(comment => {
        const div = document.createElement('div');
        div.className = 'flex items-start gap-3 p-3 border-b border-gray-100 last:border-0';
        div.innerHTML = `
          <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-gray-600 flex-shrink-0">
            ${(comment.username || 'U').charAt(0).toUpperCase()}
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="font-medium text-gray-800 text-sm">${comment.username}</span>
              <span class="text-xs text-gray-400">${formatDate(comment.createTime)}</span>
            </div>
            <div class="text-sm text-gray-600 mt-1 truncate">${comment.content}</div>
          </div>
        `;
        container.appendChild(div);
      });
    }
  } catch (error) {
    console.error('加载评论失败', error);
    document.getElementById('recent-comments').innerHTML = '<div class="text-center text-gray-400 py-4">加载失败</div>';
  }
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const date = new Date(dateStr);
  const now = new Date();
  const diff = now.getTime() - date.getTime();
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  
  if (days === 0) {
    const hours = Math.floor(diff / (1000 * 60 * 60));
    if (hours === 0) {
      const minutes = Math.floor(diff / (1000 * 60));
      return minutes <= 0 ? '刚刚' : `${minutes}分钟前`;
    }
    return `${hours}小时前`;
  } else if (days < 7) {
    return `${days}天前`;
  }
  return `${date.getMonth() + 1}/${date.getDate()}`;
}

loadStats();
loadRecentArticles();
loadRecentComments();
</script>
</body>
</html>
