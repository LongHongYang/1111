<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仪表盘 - 博客管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    .sidebar { width: 220px; background-color: #304156; min-height: 100vh; position: fixed; left: 0; top: 0; }
    .sidebar .logo { height: 60px; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; font-size: 18px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,.1); }
    .sidebar nav { padding: 10px; }
    .sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; color: #bfcbd9; text-decoration: none; border-radius: 4px; margin-bottom: 4px; }
    .sidebar nav a:hover, .sidebar nav a.active { background: #1f2d3d; color: #409eff; }
    .main-area { margin-left: 220px; }
    .topbar { height: 56px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .content { padding: 20px; background: #f0f2f5; min-height: calc(100vh - 56px); }
    .stat-card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .stat-icon { width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; }
    .quick-btn { padding: 12px; border-radius: 8px; color: white; border: none; cursor: pointer; font-size: 14px; }
  </style>
</head>
<body>

<!-- 侧边栏 -->
<aside class="sidebar">
  <div class="logo">
    <i class="fa fa-pencil-square-o"></i>
    <span>博客管理</span>
  </div>
  <nav>
    <a href="dashboard.html" class="active"><i class="fa fa-dashboard"></i> 仪表盘</a>
    <a href="articles.html"><i class="fa fa-file-text"></i> 文章管理</a>
    <a href="article-edit.html"><i class="fa fa-pencil"></i> 写文章</a>
    <a href="categories.html"><i class="fa fa-folder"></i> 分类管理</a>
    <a href="comments.html"><i class="fa fa-comments"></i> 评论管理</a>
    <a href="users.html"><i class="fa fa-users"></i> 用户管理</a>
    <a href="statistics.html"><i class="fa fa-bar-chart"></i> 数据统计</a>
    <a href="profile.html"><i class="fa fa-user"></i> 个人信息</a>
    <a href="../index.html" style="margin-top:20px;"><i class="fa fa-sign-out"></i> 退出登录</a>
  </nav>
</aside>

<!-- 主内容区 -->
<div class="main-area">
  <header class="topbar">
    <div>
      <span class="text-lg font-semibold text-gray-800">仪表盘</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-gray-600">admin</span>
      <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white">A</div>
    </div>
  </header>
  
  <main class="content">
    <!-- 统计卡片 -->
    <div class="grid grid-cols-4 gap-4 mb-6">
      <div class="stat-card flex items-center gap-4">
        <div class="stat-icon bg-gradient-to-br from-blue-400 to-blue-600"><i class="fa fa-file-text-o"></i></div>
        <div>
          <h3 class="text-2xl font-bold text-gray-800">6</h3>
          <p class="text-sm text-gray-500">文章总数</p>
        </div>
      </div>
      <div class="stat-card flex items-center gap-4">
        <div class="stat-icon bg-gradient-to-br from-green-400 to-green-600"><i class="fa fa-pencil"></i></div>
        <div>
          <h3 class="text-2xl font-bold text-gray-800">0</h3>
          <p class="text-sm text-gray-500">草稿数量</p>
        </div>
      </div>
      <div class="stat-card flex items-center gap-4">
        <div class="stat-icon bg-gradient-to-br from-orange-400 to-orange-600"><i class="fa fa-comment"></i></div>
        <div>
          <h3 class="text-2xl font-bold text-gray-800">2</h3>
          <p class="text-sm text-gray-500">评论总数</p>
        </div>
      </div>
      <div class="stat-card flex items-center gap-4">
        <div class="stat-icon bg-gradient-to-br from-gray-400 to-gray-600"><i class="fa fa-eye"></i></div>
        <div>
          <h3 class="text-2xl font-bold text-gray-800">448</h3>
          <p class="text-sm text-gray-500">总浏览量</p>
        </div>
      </div>
    </div>

    <!-- 内容区域 -->
    <div class="grid grid-cols-3 gap-4">
      <div class="col-span-2 bg-white rounded-lg shadow-sm p-6">
        <h4 class="font-semibold text-gray-800 mb-4">最近热门文章</h4>
        <table class="w-full">
          <thead>
            <tr class="text-left text-sm text-gray-500">
              <th class="pb-3">标题</th>
              <th class="pb-3">分类</th>
              <th class="pb-3 text-center">浏览</th>
              <th class="pb-3 text-center">评论</th>
            </tr>
          </thead>
          <tbody>
            <tr class="border-t border-gray-100">
              <td class="py-3 text-sm">Welcome to Blog System</td>
              <td class="py-3 text-sm text-gray-500">技术</td>
              <td class="py-3 text-sm text-center">130</td>
              <td class="py-3 text-sm text-center">5</td>
            </tr>
            <tr class="border-t border-gray-100">
              <td class="py-3 text-sm">Spring Boot 入门教程</td>
              <td class="py-3 text-sm text-gray-500">技术</td>
              <td class="py-3 text-sm text-center">98</td>
              <td class="py-3 text-sm text-center">3</td>
            </tr>
            <tr class="border-t border-gray-100">
              <td class="py-3 text-sm">Vue3 Composition API详解</td>
              <td class="py-3 text-sm text-gray-500">技术</td>
              <td class="py-3 text-sm text-center">75</td>
              <td class="py-3 text-sm text-center">2</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="space-y-4">
        <div class="bg-white rounded-lg shadow-sm p-6">
          <h4 class="font-semibold text-gray-800 mb-4">快捷操作</h4>
          <div class="grid grid-cols-2 gap-3">
            <button class="quick-btn bg-blue-500" onclick="location.href='article-edit.html'">写文章</button>
            <button class="quick-btn bg-green-500" onclick="location.href='categories.html'">管理分类</button>
            <button class="quick-btn bg-orange-500" onclick="location.href='comments.html'">审核评论</button>
            <button class="quick-btn bg-gray-500" onclick="location.href='statistics.html'">查看统计</button>
          </div>
        </div>
        <div class="bg-white rounded-lg shadow-sm p-6">
          <h4 class="font-semibold text-gray-800 mb-4">系统信息</h4>
          <div class="space-y-2 text-sm">
            <p><span class="text-gray-500">系统版本</span> <span class="float-right">v1.0.0</span></p>
            <p><span class="text-gray-500">后端框架</span> <span class="float-right">Spring Boot 2.7</span></p>
            <p><span class="text-gray-500">前端框架</span> <span class="float-right">Vue 3</span></p>
            <p><span class="text-gray-500">数据库</span> <span class="float-right">MySQL 8.0</span></p>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
