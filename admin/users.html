<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - 博客管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    const currentUser = JSON.parse(localStorage.getItem('current_user') || 'null');
    if (!currentUser || currentUser.role !== 'ADMIN') {
      alert('您没有权限访问此页面');
      location.href = '/1111/login.html';
    }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    .sidebar { width: 220px; background-color: #304156; min-height: 100vh; position: fixed; left: 0; top: 0; }
    .sidebar .logo { height: 60px; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; font-size: 18px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,.1); }
    .sidebar nav { padding: 10px; }
    .sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; color: #bfcbd9; text-decoration: none; border-radius: 4px; margin-bottom: 4px; }
    .sidebar nav a:hover, .sidebar nav a.active { background: #1f2d3d; color: #409eff; }
    .main-area { margin-left: 220px; }
    .topbar { height: 56px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .content { padding: 20px; background: #f0f2f5; min-height: calc(100vh - 56px); }
    .table-btn { padding: 4px 10px; border-radius: 4px; border: 1px solid #dcdfe6; background: white; cursor: pointer; font-size: 13px; }
    .table-btn:hover { border-color: #409eff; color: #409eff; }
    .table-btn.danger { color: #f56c6c; border-color: #f56c6c; }
    .table-btn.danger:hover { background: #fef0f0; }
    .table-btn.success { color: #67c23a; border-color: #67c23a; }
    .table-btn.success:hover { background: #f0f9eb; }
    .pagination-wrap { margin-top: 20px; display: flex; justify-content: flex-end; }
    .pagination button { padding: 6px 14px; border: 1px solid #e8eaed; border-radius: 4px; background: white; cursor: pointer; }
    .pagination button.active { background: #409eff; color: white; border-color: #409eff; }
    .user-cell { display: flex; align-items: center; gap: 8px; }
    .user-name { font-size: 14px; color: #303133; }
    .role-badge-admin { background: #f56c6c; color: white; }
    .role-badge-user { background: #67c23a; color: white; }
    .status-online { color: #67c23a; }
    .status-offline { color: #909399; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .toolbar-left { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .toolbar-right { margin-left: auto; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); justify-content: center; align-items: center; z-index: 1000; }
    .modal.show { display: flex; }
    .modal-content { background: white; border-radius: 8px; padding: 24px; width: 400px; }
    .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; }
    .form-item { margin-bottom: 16px; }
    .form-label { display: block; margin-bottom: 6px; font-size: 14px; color: #303133; }
    .form-input { width: 100%; padding: 8px 12px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
  </style>
</head>
<body>

<!-- 侧边栏 -->
<aside class="sidebar">
  <div class="logo">
    <i class="fa fa-pencil-square-o"></i>
    <span>博客管理</span>
  </div>
  <nav>
    <a href="dashboard.html"><i class="fa fa-dashboard"></i> 仪表盘</a>
    <a href="articles.html"><i class="fa fa-file-text"></i> 文章管理</a>
    <a href="article-edit.html"><i class="fa fa-pencil"></i> 写文章</a>
    <a href="categories.html"><i class="fa fa-folder"></i> 分类管理</a>
    <a href="comments.html"><i class="fa fa-comments"></i> 评论管理</a>
    <a href="users.html" class="active"><i class="fa fa-users"></i> 用户管理</a>
    <a href="statistics.html"><i class="fa fa-bar-chart"></i> 数据统计</a>
    <a href="profile.html"><i class="fa fa-user"></i> 个人信息</a>
    <a href="../index.html" onclick="localStorage.removeItem('current_user');"><i class="fa fa-sign-out"></i> 退出登录</a>
  </nav>
</aside>

<!-- 主内容区 -->
<div class="main-area">
  <header class="topbar">
    <div>
      <span class="text-lg font-semibold text-gray-800">用户管理</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-gray-600" id="current-user-name">admin</span>
      <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white" id="current-user-avatar">A</div>
    </div>
  </header>
  
  <main class="content">
    <div class="bg-white rounded-lg shadow-sm p-4 mb-4">
      <div class="toolbar">
        <div class="toolbar-left">
          <input type="text" id="keyword" placeholder="搜索用户名/昵称..." class="w-56 px-3 py-2 border border-gray-300 rounded-lg text-sm">
          <select id="role" class="w-32 px-3 py-2 border border-gray-300 rounded-lg text-sm">
            <option value="">角色</option>
            <option value="ADMIN">管理员</option>
            <option value="USER">普通用户</option>
          </select>
          <button class="px-4 py-2 bg-blue-500 text-white rounded-lg text-sm" onclick="renderUsers()">搜索</button>
        </div>
        <div class="toolbar-right">
          <span class="px-2 py-1 bg-blue-50 text-blue-600 rounded text-sm mr-2" id="user-count">共 0 位用户</span>
          <button class="px-4 py-2 bg-blue-500 text-white rounded-lg text-sm" onclick="openAddModal()">新增用户</button>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow-sm">
      <table class="w-full">
        <thead>
          <tr class="text-left text-sm text-gray-500 bg-gray-50">
            <th class="px-6 py-3 w-12 text-center">ID</th>
            <th class="px-6 py-3">用户信息</th>
            <th class="px-6 py-3 w-28 text-center">角色</th>
            <th class="px-6 py-3 w-20 text-center">状态</th>
            <th class="px-6 py-3 w-44 text-center">注册时间</th>
            <th class="px-6 py-3 w-40 text-center">操作</th>
          </tr>
        </thead>
        <tbody id="user-table-body">
        </tbody>
      </table>
      <div class="pagination-wrap">
        <div class="pagination" id="pagination">
        </div>
      </div>
    </div>
  </main>
</div>

<!-- 新增/编辑用户弹窗 -->
<div class="modal" id="user-modal">
  <div class="modal-content">
    <h3 class="modal-title" id="modal-title">新增用户</h3>
    <form id="user-form">
      <input type="hidden" id="user-id">
      <div class="form-item">
        <label class="form-label">用户名</label>
        <input type="text" id="user-username" class="form-input" placeholder="请输入用户名">
      </div>
      <div class="form-item">
        <label class="form-label">昵称</label>
        <input type="text" id="user-nickname" class="form-input" placeholder="请输入昵称">
      </div>
      <div class="form-item">
        <label class="form-label">密码</label>
        <input type="password" id="user-password" class="form-input" placeholder="请输入密码">
      </div>
      <div class="form-item">
        <label class="form-label">角色</label>
        <select id="user-role" class="form-input">
          <option value="USER">普通用户</option>
          <option value="ADMIN">管理员</option>
        </select>
      </div>
      <div class="modal-footer">
        <button type="button" onclick="closeModal()" class="px-4 py-2 border border-gray-300 rounded-lg">取消</button>
        <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded-lg">保存</button>
      </div>
    </form>
  </div>
</div>

<script>
const user = JSON.parse(localStorage.getItem('current_user') || 'null');
document.getElementById('current-user-name').textContent = user.nickname || user.username;
document.getElementById('current-user-avatar').textContent = (user.nickname || user.username).charAt(0).toUpperCase();

function getUsers() {
  return JSON.parse(localStorage.getItem('blog_users') || '[]');
}

function saveUsers(users) {
  localStorage.setItem('blog_users', JSON.stringify(users));
}

function renderUsers() {
  const users = getUsers();
  const keyword = document.getElementById('keyword').value.toLowerCase();
  const role = document.getElementById('role').value;

  const filtered = users.filter(u => {
    const matchKeyword = !keyword || u.username.toLowerCase().includes(keyword) || (u.nickname && u.nickname.toLowerCase().includes(keyword));
    const matchRole = !role || u.role === role;
    return matchKeyword && matchRole;
  });

  document.getElementById('user-count').textContent = `共 ${filtered.length} 位用户`;
  const tbody = document.getElementById('user-table-body');
  tbody.innerHTML = '';

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-12 text-center text-gray-400">暂无用户数据</td></tr>';
    return;
  }

  filtered.forEach((u, index) => {
    const isOnline = u.id === user.id;
    const row = document.createElement('tr');
    row.className = 'border-t border-gray-100';
    row.innerHTML = `
      <td class="px-6 py-3 text-center">${index + 1}</td>
      <td class="px-6 py-3">
        <div class="user-cell">
          <div class="w-10 h-10 rounded-full ${u.role === 'ADMIN' ? 'bg-blue-500' : 'bg-gray-300'} flex items-center justify-center text-white">${(u.nickname || u.username).charAt(0).toUpperCase()}</div>
          <div>
            <p class="user-name">${u.username}</p>
            <p class="text-xs text-gray-400">${u.nickname || '未设置昵称'}</p>
          </div>
        </div>
      </td>
      <td class="px-6 py-3 text-center">
        <span class="px-2 py-1 rounded text-xs ${u.role === 'ADMIN' ? 'role-badge-admin' : 'role-badge-user'}">${u.role === 'ADMIN' ? '管理员' : '用户'}</span>
      </td>
      <td class="px-6 py-3 text-center">
        <span class="${isOnline ? 'status-online' : 'status-offline'}"><i class="fa fa-circle"></i> ${isOnline ? '在线' : '离线'}</span>
      </td>
      <td class="px-6 py-3 text-center text-sm">${u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '-'}</td>
      <td class="px-6 py-3 text-center">
        ${u.role !== 'ADMIN' ? `<button class="table-btn mr-2" onclick="editUser(${u.id})">编辑</button>` : ''}
        ${u.role !== 'ADMIN' ? `<button class="table-btn danger" onclick="deleteUser(${u.id})">删除</button>` : ''}
      </td>
    `;
    tbody.appendChild(row);
  });
}

function openAddModal() {
  document.getElementById('modal-title').textContent = '新增用户';
  document.getElementById('user-id').value = '';
  document.getElementById('user-username').value = '';
  document.getElementById('user-nickname').value = '';
  document.getElementById('user-password').value = '';
  document.getElementById('user-role').value = 'USER';
  document.getElementById('user-modal').classList.add('show');
}

function editUser(id) {
  const users = getUsers();
  const u = users.find(item => item.id === id);
  if (!u) return;

  document.getElementById('modal-title').textContent = '编辑用户';
  document.getElementById('user-id').value = u.id;
  document.getElementById('user-username').value = u.username;
  document.getElementById('user-nickname').value = u.nickname || '';
  document.getElementById('user-password').value = '';
  document.getElementById('user-role').value = u.role || 'USER';
  document.getElementById('user-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('user-modal').classList.remove('show');
}

document.getElementById('user-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const users = getUsers();
  const id = document.getElementById('user-id').value;
  const username = document.getElementById('user-username').value.trim();
  const nickname = document.getElementById('user-nickname').value.trim();
  const password = document.getElementById('user-password').value;
  const role = document.getElementById('user-role').value;

  if (!username) {
    alert('请输入用户名');
    return;
  }

  if (id) {
    const index = users.findIndex(u => u.id == id);
    if (index !== -1) {
      users[index].username = username;
      users[index].nickname = nickname;
      if (password) users[index].password = password;
      users[index].role = role;
    }
  } else {
    if (!password) {
      alert('请输入密码');
      return;
    }
    const exists = users.find(u => u.username === username);
    if (exists) {
      alert('用户名已存在');
      return;
    }
    users.push({
      id: Date.now(),
      username,
      nickname,
      password,
      role,
      createdAt: new Date().toISOString()
    });
  }

  saveUsers(users);
  closeModal();
  renderUsers();
  alert('保存成功');
});

function deleteUser(id) {
  if (!confirm('确定删除此用户吗？')) return;
  const users = getUsers();
  const filtered = users.filter(u => u.id != id);
  saveUsers(filtered);
  renderUsers();
  alert('删除成功');
}

renderUsers();
</script>
</body>
</html>
