<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>写文章 - 博客管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    .sidebar { width: 220px; background-color: #304156; min-height: 100vh; position: fixed; left: 0; top: 0; }
    .sidebar .logo { height: 60px; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; font-size: 18px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,.1); }
    .sidebar nav { padding: 10px; }
    .sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; color: #bfcbd9; text-decoration: none; border-radius: 4px; margin-bottom: 4px; }
    .sidebar nav a:hover, .sidebar nav a.active { background: #1f2d3d; color: #409eff; }
    .main-area { margin-left: 220px; }
    .topbar { height: 56px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .content { padding: 20px; background: #f0f2f5; min-height: calc(100vh - 56px); }
    .editor-container { border: 1px solid #dcdfe6; border-radius: 4px; overflow: hidden; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 12px; background: #fafafa; border-bottom: 1px solid #dcdfe6; }
    .toolbar button { padding: 4px 10px; border: 1px solid #dcdfe6; background: white; border-radius: 3px; cursor: pointer; font-size: 13px; color: #606266; }
    .toolbar button:hover { background: #ecf5ff; color: #409eff; border-color: #c6e2ff; }
    .toolbar button.active { background: #409eff; color: white; border-color: #409eff; }
    .toolbar .divider { color: #dcdfe6; padding: 0 4px; }
    .markdown-editor { width: 100%; min-height: 500px; padding: 16px; border: none; outline: none; resize: vertical; font-family: 'Monaco', 'Menlo', monospace; font-size: 14px; line-height: 1.8; box-sizing: border-box; }
    .preview { padding: 20px; min-height: 500px; background: #fafafa; overflow-y: auto; }
    .form-item { margin-bottom: 20px; }
    .form-label { display: block; font-weight: 500; margin-bottom: 8px; color: #303133; }
    .form-input { width: 100%; padding: 10px 12px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
    .form-input:focus { outline: none; border-color: #409eff; }
    .form-textarea { width: 100%; padding: 10px 12px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 14px; resize: vertical; box-sizing: border-box; }
    .form-textarea:focus { outline: none; border-color: #409eff; }
    .form-select { width: 100%; padding: 10px 12px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
    .form-select:focus { outline: none; border-color: #409eff; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin-top: 20px; margin-bottom: 10px; }
    .markdown-body p { margin-bottom: 12px; line-height: 1.8; }
    .markdown-body code { background: #f5f7fa; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
    .markdown-body pre { background: #282c34; color: #abb2bf; padding: 16px; border-radius: 6px; overflow-x: auto; margin-bottom: 12px; }
    .markdown-body blockquote { border-left: 4px solid #409eff; padding-left: 16px; color: #666; margin: 12px 0; }
  </style>
</head>
<body>

<!-- 侧边栏 -->
<aside class="sidebar">
  <div class="logo">
    <i class="fa fa-pencil-square-o"></i>
    <span>博客管理</span>
  </div>
  <nav>
    <a href="dashboard.html"><i class="fa fa-dashboard"></i> 仪表盘</a>
    <a href="articles.html"><i class="fa fa-file-text"></i> 文章管理</a>
    <a href="article-edit.html" class="active"><i class="fa fa-pencil"></i> 写文章</a>
    <a href="categories.html"><i class="fa fa-folder"></i> 分类管理</a>
    <a href="comments.html"><i class="fa fa-comments"></i> 评论管理</a>
    <a href="users.html"><i class="fa fa-users"></i> 用户管理</a>
    <a href="statistics.html"><i class="fa fa-bar-chart"></i> 数据统计</a>
    <a href="profile.html"><i class="fa fa-user"></i> 个人信息</a>
    <a href="../index.html" style="margin-top:20px;"><i class="fa fa-sign-out"></i> 退出登录</a>
  </nav>
</aside>

<!-- 主内容区 -->
<div class="main-area">
  <header class="topbar">
    <div class="flex items-center gap-4">
      <button onclick="location.href='articles.html'" class="text-gray-600 hover:text-gray-900">
        <i class="fa fa-arrow-left"></i> 返回列表
      </button>
      <span class="text-lg font-semibold text-gray-800">写新文章</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-gray-600">admin</span>
      <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white">A</div>
    </div>
  </header>
  
  <main class="content">
    <div class="bg-white rounded-lg shadow-sm p-6">
      <form id="article-form">
        <div class="form-item">
          <label class="form-label">标题</label>
          <input type="text" id="title" class="form-input" placeholder="请输入文章标题" maxlength="100">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="form-item">
            <label class="form-label">分类</label>
            <select id="category" class="form-select">
              <option value="">选择分类</option>
              <option value="1">技术</option>
              <option value="2">生活</option>
              <option value="3">随笔</option>
            </select>
          </div>
          <div class="form-item">
            <label class="form-label">标签</label>
            <input type="text" id="tags" class="form-input" placeholder="多个标签用逗号分隔">
          </div>
        </div>

        <div class="form-item">
          <label class="form-label">摘要</label>
          <textarea id="summary" class="form-textarea" rows="2" placeholder="请输入文章摘要（选填）" maxlength="200"></textarea>
        </div>

        <div class="form-item">
          <label class="form-label">封面图</label>
          <input type="text" id="coverImage" class="form-input" placeholder="封面图片URL（选填）">
        </div>

        <div class="form-item">
          <label class="form-label">内容</label>
          <div class="editor-container">
            <div class="toolbar">
              <button type="button" onclick="insertMarkdown('**', '**')"><b>B</b></button>
              <button type="button" onclick="insertMarkdown('*', '*')"><i>I</i></button>
              <button type="button" onclick="insertMarkdown('~~', '~~')"><s>S</s></button>
              <span class="divider">|</span>
              <button type="button" onclick="insertMarkdown('# ', '')">H1</button>
              <button type="button" onclick="insertMarkdown('## ', '')">H2</button>
              <span class="divider">|</span>
              <button type="button" onclick="insertMarkdown('- ', '')">列表</button>
              <button type="button" onclick="insertMarkdown('1. ', '')">有序</button>
              <button type="button" onclick="insertMarkdown('> ', '')">引用</button>
              <span class="divider">|</span>
              <button type="button" onclick="insertMarkdown('`', '`')">代码</button>
              <button type="button" onclick="insertCodeBlock()">代码块</button>
              <button type="button" onclick="insertLink()">链接</button>
              <button type="button" onclick="insertImage()">图片</button>
              <button type="button" onclick="insertTable()">表格</button>
              <span class="divider">|</span>
              <button type="button" id="preview-btn" onclick="togglePreview()" class="active">预览</button>
            </div>
            <div class="editor-body">
              <textarea id="content" class="markdown-editor" placeholder="开始编写你的文章内容... (支持 Markdown)"></textarea>
              <div id="preview-area" class="preview markdown-body hidden"></div>
            </div>
          </div>
        </div>

        <div class="flex gap-4 mb-6">
          <div class="flex items-center gap-2">
            <input type="checkbox" id="isTop" value="1">
            <label for="isTop">置顶</label>
          </div>
          <div class="flex items-center gap-2">
            <input type="radio" name="status" value="1" checked>
            <label>发布</label>
            <input type="radio" name="status" value="0" style="margin-left: 10px;">
            <label>保存草稿</label>
          </div>
        </div>

        <div class="flex gap-3">
          <button type="submit" class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">发布文章</button>
          <button type="button" class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50" onclick="saveDraft()">保存草稿</button>
        </div>
      </form>
    </div>
  </main>
</div>

<script>
const showPreview = { value: false };

function insertMarkdown(prefix, suffix) {
  const textarea = document.getElementById('content');
  if (!textarea) return;
  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  const text = textarea.value;
  const before = text.substring(0, start);
  const selected = text.substring(start, end);
  const after = text.substring(end);

  textarea.value = before + prefix + selected + suffix + after;
  
  setTimeout(() => {
    textarea.focus();
    const newPos = start + prefix.length + (end - start) + suffix.length;
    textarea.setSelectionRange(newPos, newPos);
  }, 0);
}

function insertCodeBlock() {
  insertMarkdown('\n```\n', '\n```\n');
}

function insertLink() {
  insertMarkdown('[', '](url)');
}

function insertImage() {
  insertMarkdown('![alt](', ')');
}

function insertTable() {
  const table = '\n| 列1 | 列2 | 列3 |\n|-----|-----|-----|\n| 内容 | 内容 | 内容 |\n';
  const textarea = document.getElementById('content');
  const pos = textarea.selectionStart || 0;
  textarea.value = textarea.value.substring(0, pos) + table + textarea.value.substring(pos);
}

function parseMarkdown(text) {
  return text
    .replace(/^### (.*$)/gim, '<h3>$1</h3>')
    .replace(/^## (.*$)/gim, '<h2>$1</h2>')
    .replace(/^# (.*$)/gim, '<h1>$1</h1>')
    .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
    .replace(/\*(.*)\*/gim, '<em>$1</em>')
    .replace(/`([^`]+)`/gim, '<code>$1</code>')
    .replace(/```(\w*)\n([\s\S]*?)```/gim, '<pre><code>$2</code></pre>')
    .replace(/> (.*$)/gim, '<blockquote>$1</blockquote>')
    .replace(/\n/gim, '<br>');
}

function togglePreview() {
  showPreview.value = !showPreview.value;
  const textarea = document.getElementById('content');
  const preview = document.getElementById('preview-area');
  const btn = document.getElementById('preview-btn');

  if (showPreview.value) {
    textarea.classList.add('hidden');
    preview.classList.remove('hidden');
    preview.innerHTML = parseMarkdown(textarea.value);
    btn.classList.add('active');
    btn.textContent = '编辑';
  } else {
    textarea.classList.remove('hidden');
    preview.classList.add('hidden');
    btn.classList.remove('active');
    btn.textContent = '预览';
  }
}

document.getElementById('article-form').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const title = document.getElementById('title').value;
  const content = document.getElementById('content').value;
  
  if (!title) {
    alert('请输入文章标题');
    return;
  }
  if (!content) {
    alert('请输入文章内容');
    return;
  }
  
  alert('文章发布成功！');
  location.href = 'articles.html';
});

function saveDraft() {
  alert('草稿保存成功！');
}
</script>
</body>
</html>
