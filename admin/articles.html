<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章管理 - 博客管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="../api.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    .sidebar { width: 220px; background-color: #304156; min-height: 100vh; position: fixed; left: 0; top: 0; }
    .sidebar .logo { height: 60px; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; font-size: 18px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,.1); }
    .sidebar nav { padding: 10px; }
    .sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; color: #bfcbd9; text-decoration: none; border-radius: 4px; margin-bottom: 4px; }
    .sidebar nav a:hover, .sidebar nav a.active { background: #1f2d3d; color: #409eff; }
    .main-area { margin-left: 220px; }
    .topbar { height: 56px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .content { padding: 20px; background: #f0f2f5; min-height: calc(100vh - 56px); }
    .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .toolbar-left { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .stats { display: flex; align-items: center; gap: 6px; color: #606266; font-size: 14px; }
    .stats strong { color: #303133; }
    .table-btn { padding: 4px 10px; border-radius: 4px; border: 1px solid #dcdfe6; background: white; cursor: pointer; font-size: 13px; }
    .table-btn:hover { border-color: #409eff; color: #409eff; }
    .table-btn.danger { color: #f56c6c; border-color: #f56c6c; }
    .table-btn.danger:hover { background: #fef0f0; }
    .table-btn.primary { color: #409eff; border-color: #409eff; }
    .pagination-wrap { margin-top: 20px; display: flex; justify-content: flex-end; }
    .pagination button { padding: 6px 14px; border: 1px solid #e8eaed; border-radius: 4px; background: white; cursor: pointer; }
    .pagination button.active { background: #409eff; color: white; border-color: #409eff; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <i class="fa fa-pencil-square-o"></i>
    <span>博客管理</span>
  </div>
  <nav>
    <a href="/1111/admin/dashboard.html"><i class="fa fa-dashboard"></i> 仪表盘</a>
    <a href="/1111/admin/articles.html" class="active"><i class="fa fa-file-text"></i> 文章管理</a>
    <a href="/1111/admin/article-edit.html"><i class="fa fa-pencil"></i> 写文章</a>
    <a href="/1111/admin/categories.html"><i class="fa fa-folder"></i> 分类管理</a>
    <a href="/1111/admin/comments.html"><i class="fa fa-comments"></i> 评论管理</a>
    <a href="/1111/admin/users.html"><i class="fa fa-users"></i> 用户管理</a>
    <a href="/1111/admin/statistics.html"><i class="fa fa-bar-chart"></i> 数据统计</a>
    <a href="/1111/admin/profile.html"><i class="fa fa-user"></i> 个人信息</a>
    <a href="/1111/index.html" onclick="BlogAPI.clearToken()"><i class="fa fa-sign-out"></i> 退出登录</a>
  </nav>
</aside>

<div class="main-area">
  <header class="topbar">
    <div>
      <span class="text-lg font-semibold text-gray-800">文章管理</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-gray-600" id="current-user-name">admin</span>
      <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white" id="current-user-avatar">A</div>
    </div>
  </header>
  
  <main class="content">
    <div class="bg-white rounded-lg shadow-sm p-4 mb-4">
      <div class="toolbar">
        <div class="toolbar-left">
          <input type="text" id="keyword" placeholder="搜索标题/摘要..." class="w-56 px-3 py-2 border border-gray-300 rounded-lg text-sm">
          <select id="category" class="w-36 px-3 py-2 border border-gray-300 rounded-lg text-sm">
            <option value="">分类</option>
            <option value="1">技术</option>
            <option value="2">生活</option>
            <option value="3">随笔</option>
          </select>
          <select id="status" class="w-32 px-3 py-2 border border-gray-300 rounded-lg text-sm">
            <option value="">状态</option>
            <option value="1">已发布</option>
            <option value="0">草稿/下架</option>
          </select>
          <button class="px-4 py-2 bg-blue-500 text-white rounded-lg text-sm" onclick="renderArticles()">搜索</button>
          <button class="px-4 py-2 border border-gray-300 rounded-lg text-sm" onclick="resetSearch()">重置</button>
        </div>
        <div class="toolbar-right">
          <span class="stats" id="article-stats">
            共 <strong>0</strong> 篇
            <span class="px-2 py-0.5 bg-green-100 text-green-600 rounded text-xs" id="published-count">0 已发布</span>
            <span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs" id="draft-count">0 草稿</span>
          </span>
          <button class="px-4 py-2 bg-blue-500 text-white rounded-lg text-sm" onclick="location.href='article-edit.html'">写文章</button>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow-sm">
      <table class="w-full">
        <thead>
          <tr class="text-left text-sm text-gray-500 bg-gray-50">
            <th class="px-6 py-3 w-10"><input type="checkbox" id="select-all"></th>
            <th class="px-6 py-3">标题</th>
            <th class="px-6 py-3 w-36 text-center">分类/作者</th>
            <th class="px-6 py-3 w-32 text-center">数据</th>
            <th class="px-6 py-3 w-24 text-center">状态</th>
            <th class="px-6 py-3 w-40 text-center">发布时间</th>
            <th class="px-6 py-3 w-48 text-center">操作</th>
          </tr>
        </thead>
        <tbody id="article-table-body">
        </tbody>
      </table>
    </div>
  </main>
</div>

<script>
const user = JSON.parse(localStorage.getItem('current_user') || 'null');
if (!user || user.role !== 1) {
  alert('您没有权限访问此页面');
  location.href = '/1111/login.html';
}

document.getElementById('current-user-name').textContent = user.nickname || user.username;
document.getElementById('current-user-avatar').textContent = (user.nickname || user.username).charAt(0).toUpperCase();

document.getElementById('select-all').addEventListener('change', function(e) {
  document.querySelectorAll('.article-checkbox').forEach(cb => cb.checked = e.target.checked);
});

function resetSearch() {
  document.getElementById('keyword').value = '';
  document.getElementById('category').value = '';
  document.getElementById('status').value = '';
  renderArticles();
}

function editArticle(id) {
  location.href = `article-edit.html?id=${id}`;
}

async function renderArticles() {
  const keyword = document.getElementById('keyword').value.trim();
  const category = document.getElementById('category').value;
  const status = document.getElementById('status').value;
  
  try {
    const result = await BlogAPI.getAdminArticleList({ keyword, categoryId: category, status, pageNum: 1, pageSize: 100 });
    
    if (result.code === 200) {
      const articles = result.data.records || result.data.list || [];
      
      const publishedCount = articles.filter(a => a.status == 1).length;
      const draftCount = articles.filter(a => a.status == 0).length;
      document.querySelector('#article-stats strong').textContent = articles.length;
      document.getElementById('published-count').textContent = `${publishedCount} 已发布`;
      document.getElementById('draft-count').textContent = `${draftCount} 草稿`;

      const tbody = document.getElementById('article-table-body');
      tbody.innerHTML = '';

      if (articles.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-12 text-center text-gray-400">暂无文章数据</td></tr>';
        return;
      }

      articles.sort((a, b) => {
        if (a.isTop !== b.isTop) return b.isTop - a.isTop;
        return new Date(b.createTime) - new Date(a.createTime);
      });

      articles.forEach((a, index) => {
        const row = document.createElement('tr');
        row.className = 'border-t border-gray-100';
        row.innerHTML = `
          <td class="px-6 py-3"><input type="checkbox" class="article-checkbox" value="${a.id}"></td>
          <td class="px-6 py-3">
            <div class="flex items-center gap-2">
              ${a.isTop == 1 ? '<i class="fa fa-star text-red-500"></i>' : ''}
              <span class="text-blue-500 cursor-pointer hover:underline">${a.title}</span>
            </div>
          </td>
          <td class="px-6 py-3 text-center">
            <div>
              <span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs">${a.categoryName || '未分类'}</span>
              <div class="text-xs text-gray-500 mt-1">${a.authorName || '未知'}</div>
            </div>
          </td>
          <td class="px-6 py-3 text-center text-sm text-gray-500">
            <span><i class="fa fa-eye"></i> ${a.viewCount || 0}</span>
            <span class="ml-3"><i class="fa fa-comment"></i> ${a.commentCount || 0}</span>
          </td>
          <td class="px-6 py-3 text-center">
            <span class="px-2 py-1 ${a.status == 1 ? 'bg-green-100 text-green-600' : 'bg-gray-100 text-gray-600'} rounded text-xs">${a.status == 1 ? '已发布' : '草稿'}</span>
          </td>
          <td class="px-6 py-3 text-center text-sm">${formatDate(a.createTime)}</td>
          <td class="px-6 py-3 text-center">
            <button class="table-btn primary mr-2" onclick="editArticle(${a.id})"><i class="fa fa-edit"></i></button>
            <button class="table-btn" onclick="toggleTop(${a.id})">${a.isTop == 1 ? '<i class="fa fa-arrow-down"></i>' : '<i class="fa fa-arrow-up"></i>'}</button>
            <button class="table-btn danger" onclick="deleteArticle(${a.id})"><i class="fa fa-trash"></i></button>
          </td>
        `;
        tbody.appendChild(row);
      });
    } else {
      alert(result.msg || '获取文章列表失败');
    }
  } catch (error) {
    console.error(error);
  }
}

async function toggleTop(id) {
  try {
    const result = await BlogAPI.setArticleTop(id, 1);
    if (result.code === 200) {
      renderArticles();
      alert('置顶状态已切换');
    } else {
      alert(result.msg || '操作失败');
    }
  } catch (error) {
    console.error(error);
  }
}

async function deleteArticle(id) {
  if (!confirm('确定删除这篇文章吗？')) return;
  try {
    const result = await BlogAPI.deleteArticle(id);
    if (result.code === 200) {
      renderArticles();
      alert('删除成功');
    } else {
      alert(result.msg || '删除失败');
    }
  } catch (error) {
    console.error(error);
  }
}

renderArticles();
</script>
</body>
</html>
