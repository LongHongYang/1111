<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章详情 - 个人博客</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="api.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    .header-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .markdown-content h1 { font-size: 28px; margin: 24px 0 16px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
    .markdown-content h2 { font-size: 22px; margin: 20px 0 12px; }
    .markdown-content h3 { font-size: 18px; margin: 16px 0 10px; }
    .markdown-content p { margin: 10px 0; line-height: 1.8; }
    .markdown-content code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-size: 14px; }
    .markdown-content pre { background: #2d2d2d; color: #ccc; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 16px 0; }
    .markdown-content pre code { background: none; padding: 0; color: inherit; }
    .markdown-content blockquote { border-left: 4px solid #409eff; padding-left: 16px; margin: 16px 0; color: #666; background: #f5f7fa; padding: 12px 16px; border-radius: 0 4px 4px 0; }
    .markdown-content ul, .markdown-content ol { padding-left: 24px; margin: 10px 0; }
    .markdown-content li { margin: 6px 0; }
    .comment-item { border-bottom: 1px solid #f0f0f0; padding-bottom: 16px; margin-bottom: 16px; }
    .comment-item:last-child { border-bottom: none; }
    .sidebar-card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .related-item { display: block; padding: 10px 12px; border-radius: 6px; transition: all .2s; }
    .related-item:hover { background: #f5f7fa; }
  </style>
</head>
<body class="bg-gray-50">

<!-- 头部导航 -->
<header class="header-gradient text-white sticky top-0 z-50 shadow-lg">
  <div class="max-w-4xl mx-auto px-4 h-14 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <button onclick="location.href = '/1111/index.html'" class="text-gray-100 hover:text-white">
        <i class="fa fa-arrow-left"></i> 返回首页
      </button>
    </div>
    <div class="logo flex items-center gap-2" onclick="location.href = '/1111/index.html'">
      <i class="fa fa-pencil-square-o"></i>
      <span class="font-bold">我的博客</span>
    </div>
    <div class="flex items-center gap-3">
      <button class="text-gray-100 hover:text-white">
        <i class="fa fa-heart-o"></i>
      </button>
      <button class="text-gray-100 hover:text-white">
        <i class="fa fa-bookmark-o"></i>
      </button>
    </div>
  </div>
</header>

<!-- 主体内容 -->
<main class="max-w-4xl mx-auto px-4 py-8">
  <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
    <!-- 左侧文章主体 -->
    <div class="lg:col-span-3">
      <article class="bg-white rounded-lg shadow-sm overflow-hidden">
        <div class="p-8">
          <h1 class="text-3xl font-bold text-gray-800 mb-4" id="article-title"></h1>
          <div class="flex flex-wrap gap-4 text-sm text-gray-500 mb-6">
            <span><i class="fa fa-folder mr-1"></i> <span id="article-category"></span></span>
            <span><i class="fa fa-user mr-1"></i> <span id="article-author"></span></span>
            <span><i class="fa fa-calendar mr-1"></i> <span id="article-date"></span></span>
            <span><i class="fa fa-eye mr-1"></i> <span id="article-views"></span></span>
            <span><i class="fa fa-comment mr-1"></i> <span id="article-comments"></span></span>
          </div>
          <div class="flex flex-wrap gap-2 mb-6" id="article-tags"></div>
          <div class="markdown-content text-gray-700" id="article-content"></div>
        </div>

        <!-- 操作栏 -->
        <div class="px-8 py-4 border-t border-gray-100 flex justify-between items-center">
          <div class="flex gap-4">
            <button class="px-4 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 flex items-center gap-2" onclick="handleLike()">
              <i class="fa fa-thumbs-up"></i> 点赞 <span id="like-count">0</span>
            </button>
            <button class="px-4 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 flex items-center gap-2">
              <i class="fa fa-bookmark-o"></i> 收藏
            </button>
          </div>
          <div class="flex gap-3">
            <button class="px-4 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 flex items-center gap-2">
              <i class="fa fa-download"></i> 导出
            </button>
            <button onclick="location.href = '/1111/index.html'" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 flex items-center gap-2">
              <i class="fa fa-arrow-left"></i> 返回
            </button>
          </div>
        </div>

        <!-- 评论区 -->
        <div class="px-8 py-6 bg-gray-50">
          <h3 class="font-semibold text-gray-800 mb-4">评论 <span id="comment-count">(0)</span></h3>
          
          <!-- 发表评论 -->
          <div class="bg-white border border-gray-200 rounded-lg p-4 mb-6">
            <div class="flex gap-3">
              <div class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center text-gray-600">
                <span id="current-user-avatar">U</span>
              </div>
              <div class="flex-1">
                <textarea class="w-full h-20 border border-gray-200 rounded-lg p-3 resize-none focus:outline-none focus:border-blue-500" id="comment-input" placeholder="写下你的评论..."></textarea>
                <div class="flex justify-end mt-3">
                  <button class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600" onclick="submitComment()">发表评论</button>
                </div>
              </div>
            </div>
          </div>

          <!-- 评论列表 -->
          <div class="space-y-4" id="comment-list"></div>
        </div>
      </article>
    </div>

    <!-- 右侧边栏 -->
    <aside class="lg:col-span-1">
      <div class="sidebar-card">
        <h4 class="font-semibold text-gray-800 mb-4">相关推荐</h4>
        <div class="space-y-3" id="related-articles"></div>
      </div>
    </aside>
  </div>
</main>

<script>
let currentArticleId = 0;

function parseMarkdown(text) {
  return text
    .replace(/^### (.*$)/gim, '<h3>$1</h3>')
    .replace(/^## (.*$)/gim, '<h2>$1</h2>')
    .replace(/^# (.*$)/gim, '<h1>$1</h1>')
    .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
    .replace(/\*(.*)\*/gim, '<em>$1</em>')
    .replace(/`([^`]+)`/gim, '<code>$1</code>')
    .replace(/```(\w*)\n([\s\S]*?)```/gim, '<pre><code>$2</code></pre>')
    .replace(/> (.*$)/gim, '<blockquote>$1</blockquote>')
    .replace(/\n/gim, '<br>');
}

async function loadArticle(id) {
  try {
    const result = await BlogAPI.getArticle(id);
    if (result.code === 200) {
      const article = result.data;
      currentArticleId = article.id;
      
      document.getElementById('article-title').textContent = article.title;
      document.getElementById('article-category').textContent = article.categoryName || '未分类';
      document.getElementById('article-author').textContent = article.authorName || '未知作者';
      document.getElementById('article-date').textContent = article.createTime ? article.createTime.substring(0, 10) : '';
      document.getElementById('article-views').textContent = article.viewCount || 0;
      document.getElementById('article-comments').textContent = article.commentCount || 0;
      document.getElementById('comment-count').textContent = `(${article.commentCount || 0})`;
      document.getElementById('like-count').textContent = article.likeCount || 0;
      
      document.getElementById('article-tags').innerHTML = article.tags ? article.tags.map(tag => 
        `<span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-sm">${tag.name || tag}</span>`
      ).join('') : '';

      document.getElementById('article-content').innerHTML = parseMarkdown(article.content || '');
      
      loadComments(id);
      loadRelatedArticles(id, article.categoryId);
    }
  } catch (error) {
    console.error('加载文章失败:', error);
    document.getElementById('article-content').innerHTML = '<p>加载文章失败，请稍后重试</p>';
  }
}

async function loadComments(articleId) {
  try {
    const result = await BlogAPI.getComments(articleId);
    if (result.code === 200) {
      renderComments(result.data);
    }
  } catch (error) {
    console.error('加载评论失败:', error);
  }
}

function renderComments(comments) {
  const list = document.getElementById('comment-list');
  if (!comments || comments.length === 0) {
    list.innerHTML = '<p class="text-center text-gray-400 py-8">暂无评论，快来发表第一条评论吧！</p>';
    return;
  }
  
  list.innerHTML = comments.map(comment => `
    <div class="comment-item">
      <div class="flex gap-3">
        <div class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center text-gray-600 flex-shrink-0">${(comment.authorName || 'U').charAt(0).toUpperCase()}</div>
        <div class="flex-1">
          <div class="flex items-center gap-2 mb-2">
            <span class="font-medium text-gray-800">${comment.authorName || '匿名用户'}</span>
            <span class="text-xs text-gray-400">${comment.createTime ? comment.createTime.substring(0, 16) : ''}</span>
          </div>
          <p class="text-gray-600">${comment.content}</p>
          <button class="text-sm text-blue-500 mt-2 hover:underline">回复</button>
        </div>
      </div>
    </div>
  `).join('');
}

async function submitComment() {
  const content = document.getElementById('comment-input').value.trim();
  if (!content) {
    alert('请输入评论内容');
    return;
  }
  
  const user = JSON.parse(localStorage.getItem('current_user') || 'null');
  if (!user) {
    alert('请先登录');
    location.href = '/1111/login.html';
    return;
  }
  
  try {
    const result = await BlogAPI.submitComment({
      articleId: currentArticleId,
      content: content
    });
    
    if (result.code === 200) {
      alert('评论发表成功');
      document.getElementById('comment-input').value = '';
      loadComments(currentArticleId);
    } else {
      alert(result.msg || '评论失败');
    }
  } catch (error) {
    alert('评论失败，请检查后端服务是否正常');
    console.error(error);
  }
}

async function loadRelatedArticles(articleId, categoryId) {
  try {
    const result = await BlogAPI.getRelatedArticles(articleId, categoryId, 5);
    if (result.code === 200) {
      const container = document.getElementById('related-articles');
      container.innerHTML = result.data.map(article => `
        <div class="related-item cursor-pointer" onclick="location.href = '/1111/article.html?id=${article.id}'">
          <div class="text-sm text-gray-700 truncate">${article.title}</div>
          <div class="flex justify-between mt-1 text-xs text-gray-400">
            <span>${article.viewCount || 0} 阅读</span>
            <span>${article.createTime ? article.createTime.substring(0, 10) : ''}</span>
          </div>
        </div>
      `).join('');
    }
  } catch (error) {
    console.error('加载相关文章失败:', error);
  }
}

async function handleLike() {
  const user = JSON.parse(localStorage.getItem('current_user') || 'null');
  if (!user) {
    alert('请先登录');
    location.href = '/1111/login.html';
    return;
  }
  
  try {
    const result = await BlogAPI.likeArticle(currentArticleId);
    if (result.code === 200) {
      const likeCount = document.getElementById('like-count');
      likeCount.textContent = parseInt(likeCount.textContent) + 1;
    }
  } catch (error) {
    console.error('点赞失败:', error);
  }
}

function init() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id')) || 1;
  
  const user = JSON.parse(localStorage.getItem('current_user') || 'null');
  if (user) {
    document.getElementById('current-user-avatar').textContent = (user.username || user.nickname || 'U').charAt(0).toUpperCase();
  }
  
  loadArticle(id);
}

init();
</script>
</body>
</html>
